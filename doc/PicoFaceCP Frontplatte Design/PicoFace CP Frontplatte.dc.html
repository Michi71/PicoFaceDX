<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 794, &quot;height&quot;: 559 },
  &quot;showCutMarks&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Markup&quot; },
  &quot;showDims&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Markup&quot; },
  &quot;showGrid&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Sheet&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    const hide = (v) => (v === false ? { display: "none" } : {});
    return {
      cutStyle: hide(this.props.showCutMarks),
      dimStyle: hide(this.props.showDims),
      gridStyle: hide(this.props.showGrid),
    };
  }
}
</script>
